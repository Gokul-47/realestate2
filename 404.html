<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly</title>

    <!-- CSS Libraries -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .error-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .error-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><rect fill="rgba(255,255,255,0.05)" width="50" height="50"/></svg>');
            background-size: 100px 100px;
            opacity: 0.3;
        }

        .error-content {
            text-align: center;
            color: white;
            position: relative;
            z-index: 1;
            max-width: 700px;
        }

        .error-code {
            font-size: 10rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 1rem;
            animation: bounce 2s ease-in-out infinite;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .error-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .error-description {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            opacity: 0.95;
            line-height: 1.6;
        }

        .error-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .error-buttons .btn {
            padding: 0.875rem 2rem;
            font-weight: 600;
            border-radius: 30px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .btn-home {
            background: white;
            color: #667eea;
            border: 2px solid white;
        }

        .btn-home:hover {
            background: #f59e0b;
            color: white;
            border-color: #f59e0b;
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .error-icon {
            margin-bottom: 2rem;
            animation: float 3s ease-in-out infinite;
        }

        .error-icon i {
            font-size: 5rem;
            opacity: 0.8;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .decorative-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: pulse 4s ease-in-out infinite;
        }

        .decorative-circle:nth-child(1) {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }

        .decorative-circle:nth-child(2) {
            width: 200px;
            height: 200px;
            bottom: 15%;
            right: 10%;
            animation-delay: 1s;
        }

        .decorative-circle:nth-child(3) {
            width: 150px;
            height: 150px;
            top: 50%;
            right: 5%;
            animation-delay: 2s;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.2;
            }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .error-code {
                font-size: 7rem;
            }

            .error-title {
                font-size: 2rem;
            }

            .error-description {
                font-size: 1.125rem;
            }

            .error-icon i {
                font-size: 4rem;
            }

            .decorative-circle {
                display: none;
            }
        }

        @media (max-width: 575px) {
            .error-wrapper {
                padding: 1.5rem;
            }

            .error-code {
                font-size: 5rem;
            }

            .error-title {
                font-size: 1.75rem;
            }

            .error-description {
                font-size: 1rem;
            }

            .error-buttons {
                flex-direction: column;
                width: 100%;
            }

            .error-buttons .btn {
                width: 100%;
                justify-content: center;
            }

            .error-icon i {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="error-wrapper">
        <!-- Decorative Elements -->
        <div class="decorative-circle"></div>
        <div class="decorative-circle"></div>
        <div class="decorative-circle"></div>

        <div class="error-content">
            

            <h1 class="error-code">404</h1>

            <h2 class="error-title">Oops! Page Not Found</h2>

            <p class="error-description">
                The page you're looking for seems to have moved to a new address.
                Don't worry, we'll help you find your way back home.
            </p>

            <div class="error-buttons">
                <a href="#" id="backButton" class="btn btn-back">
                    <i class="fas fa-arrow-left"></i>
                    Go Back
                </a>
                <a href="index.html" class="btn btn-home">
                    <i class="fas fa-home"></i>
                    Back to Home
                </a>
            </div>
        </div>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>

    <script>
        // Back button functionality
        document.addEventListener('DOMContentLoaded', function() {
            const backButton = document.getElementById('backButton');

            if (backButton) {
                backButton.addEventListener('click', function(e) {
                    e.preventDefault();

                    // Check if there's a previous page in history
                    if (document.referrer && document.referrer !== window.location.href) {
                        window.history.back();
                    } else {
                        // If no referrer, go to home page
                        window.location.href = 'index.html';
                    }
                });
            }
        });
    </script>
</body>
</html>
